name: Auto-bump version

# Përgjigjet pas çdo push në main: lexon APP_VERSION te src/lib/version.ts,
# rrit segmentin e fundit me 1 (1.0001 → 1.0002), dhe bën commit me [skip ci]
# që të mos triggerohet rishfaqja e këtij workflow-i.
#
# Railway shmang rideploy-in e këtij commit-i sepse railway.json ka
# watchPatterns që përjashtojnë src/lib/version.ts.

on:
  push:
    branches: [main]

jobs:
  bump:
    name: Bump version
    runs-on: ubuntu-latest
    # Mbroju nga loop-i: skip nëse vetë bot-i e ka pushuar, ose nëse
    # commit-i ka [skip ci] / ka në mesazh "bump version"
    if: |
      github.actor != 'github-actions[bot]' &&
      !contains(github.event.head_commit.message, '[skip ci]') &&
      !startsWith(github.event.head_commit.message, 'chore: bump version')
    permissions:
      contents: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          ref: main
          fetch-depth: 1

      - name: Compute next version
        id: bump
        run: |
          CURRENT=$(grep -oP 'APP_VERSION\s*=\s*"\K[^"]+' src/lib/version.ts)
          if [ -z "$CURRENT" ]; then
            echo "Could not parse APP_VERSION from src/lib/version.ts" >&2
            exit 1
          fi
          MAJOR="${CURRENT%.*}"
          PATCH="${CURRENT##*.}"
          # Heq zerot e parashtruara me 10# që shmang interpretimin si oktal,
          # pastaj rifut padding 4-shifror (1.0009 -> 1.0010, 1.0099 -> 1.0100).
          NEXT_PATCH=$(printf "%04d" $((10#$PATCH + 1)))
          NEXT="${MAJOR}.${NEXT_PATCH}"
          echo "current=$CURRENT" >> "$GITHUB_OUTPUT"
          echo "next=$NEXT" >> "$GITHUB_OUTPUT"
          echo "Version: $CURRENT → $NEXT"

      - name: Update src/lib/version.ts
        run: |
          sed -i "s/APP_VERSION = \"${{ steps.bump.outputs.current }}\"/APP_VERSION = \"${{ steps.bump.outputs.next }}\"/" src/lib/version.ts
          grep -n "APP_VERSION" src/lib/version.ts

      - name: Commit and push
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add src/lib/version.ts
          if git diff --staged --quiet; then
            echo "No changes to commit"
            exit 0
          fi
          git commit -m "chore: bump version to ${{ steps.bump.outputs.next }} [skip ci]"
          git push
